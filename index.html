:root {
  --brand:      #1852FE;
  --brand-soft: #EAF1FE;
  --text:       #0E1A33;
  --text-2:     #5A6B85;
  --page-bg:    #F0F2F7;
  --card:       #FFFFFF;
  --border:     #E4E9F2;
  --nav:        #0B1B3A;
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

html, body {
  height:100%;
  font-family:'Gilroy', -apple-system, system-ui, sans-serif;
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}


/* ── Full-page loader ── */
.app-loader {
  position:fixed; inset:0; z-index:500;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:radial-gradient(120% 120% at 50% 0%, #FFFFFF 0%, var(--page-bg) 55%, #E9EDF5 100%);
  overflow:hidden;
}
.app-loader::before {
  content:''; position:absolute;
  width:620px; height:620px; border-radius:50%;
  background:radial-gradient(circle, rgba(24,82,254,0.10) 0%, rgba(24,82,254,0) 70%);
  top:50%; left:50%; transform:translate(-50%,-58%);
  pointer-events:none;
}

.loader-stack {
  position:relative; z-index:1;
  display:flex; flex-direction:column;
  align-items:center; text-align:center;
  padding:24px;
}

/* ── Shared animation keyframes ── */
@keyframes gFill {
  0%   { clip-path:inset(100% 0 0 0); opacity:1; }
  60%  { clip-path:inset(0 0 0 0);    opacity:1; }
  88%  { clip-path:inset(0 0 0 0);    opacity:1; }
  100% { clip-path:inset(0 0 0 0);    opacity:0; }
}
@keyframes gBreathe {
  0%,100% { transform:scale(1);    filter:drop-shadow(0 6px 14px rgba(24,82,254,0.12)); }
  50%     { transform:scale(1.05); filter:drop-shadow(0 10px 24px rgba(24,82,254,0.28)); }
}

/* ── Mark visibility switch ── */
.mark-wrap         { display:none; }
.mark-wrap.active  { display:block; }

/* ── Option 1: GeoConnect full logo ── */
.logo-wrap { margin-bottom:16px; }
.logo-mark {
  position:relative; display:inline-block; height:32px;
}
.logo-mark img { display:block; height:32px; width:auto; }
.logo-mark .l-ghost { opacity:0.14; }
.logo-mark .l-fill  {
  position:absolute; top:0; left:0; height:100%; width:auto;
  clip-path:inset(100% 0 0 0);
}
@media (prefers-reduced-motion: no-preference) {
  .logo-mark { animation:gBreathe 2.4s ease-in-out infinite; }
  .logo-mark .l-fill { animation:gFill 1.8s cubic-bezier(.4,0,.2,1) infinite; }
}
@media (prefers-reduced-motion: reduce) {
  .logo-mark .l-fill { clip-path:inset(0 0 0 0); }
}

/* ── Option 2: 'co' path-draw animation ── */
.co-wrap { margin-bottom:20px; }
.co-anim-wrap {
  display:inline-block;
  transform-box:fill-box;
  transform-origin:center;
}
.co-svg { overflow:visible; display:block; }
.co-ghost-fill {
  fill:#1852FE;
  opacity:0.10;
}
.co-tracer-path {
  fill:none;
  stroke:#1852FE;
  stroke-width:1.8;
  stroke-linecap:round;
  stroke-linejoin:round;
  stroke-dasharray:600;
  stroke-dashoffset:600;
  animation:coTracePath 2.8s cubic-bezier(.4,0,.2,1) infinite;
}
.co-fill-reveal {
  fill:#1852FE;
  clip-path:inset(100% 0 0 0);
  animation:coFillReveal 2.8s cubic-bezier(.4,0,.2,1) infinite;
}
@media (prefers-reduced-motion: no-preference) {
  .co-anim-wrap { animation:gBreathe 2.8s ease-in-out infinite; }
}
@media (prefers-reduced-motion: reduce) {
  .co-tracer-path { stroke-dashoffset:0; }
  .co-fill-reveal  { clip-path:inset(0 0 0 0); opacity:1; }
}
@keyframes coTracePath {
  0%   { stroke-dashoffset:600; opacity:0; }
  4%   { stroke-dashoffset:600; opacity:1; }
  60%  { stroke-dashoffset:0;   opacity:1; }
  78%  { stroke-dashoffset:0;   opacity:0; }
  100% { stroke-dashoffset:600; opacity:0; }
}
@keyframes coFillReveal {
  0%   { clip-path:inset(100% 0 0 0); opacity:0; }
  54%  { clip-path:inset(100% 0 0 0); opacity:0; }
  57%  { clip-path:inset(100% 0 0 0); opacity:1; }
  78%  { clip-path:inset(0%   0 0 0); opacity:1; }
  88%  { clip-path:inset(0%   0 0 0); opacity:1; }
  97%  { clip-path:inset(0%   0 0 0); opacity:0; }
  100% { clip-path:inset(100% 0 0 0); opacity:0; }
}

/* ── Option 3: 'g' mark ── */
.gmark-wrap { margin-bottom:20px; }
.gmark { position:relative; width:38px; height:48px; }
.gmark img {
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:contain; object-position:center;
}
.gmark .g-ghost { opacity:0.14; }
.gmark .g-fill  { clip-path:inset(100% 0 0 0); }
@media (prefers-reduced-motion: no-preference) {
  .gmark { animation:gBreathe 2.4s ease-in-out infinite; }
  .gmark .g-fill { animation:gFill 1.8s cubic-bezier(.4,0,.2,1) infinite; }
}
@media (prefers-reduced-motion: reduce) {
  .gmark .g-fill { clip-path:inset(0 0 0 0); }
}

/* ── Shared loader text ── */
.loader-msg { font-size:17px; font-weight:600; color:var(--text); letter-spacing:-0.1px; }
.loader-sub { font-size:13px; font-weight:400; color:var(--text-2); margin-top:8px; }

/* ── Colour-wheel option switcher ── */
.opt-wrap {
  position:absolute; top:20px; right:20px; z-index:10;
}
.opt-btn {
  width:24px; height:24px;
  border:none; background:none; cursor:pointer; padding:0;
  border-radius:50%; display:flex; align-items:center; justify-content:center;
}
.opt-wheel {
  width:24px; height:24px; border-radius:50%;
  background:conic-gradient(
    #1852FE 0deg 60deg,
    #00C9A7 60deg 120deg,
    #FFD166 120deg 180deg,
    #FF4D6D 180deg 240deg,
    #9B5DE5 240deg 300deg,
    #FF8C00 300deg 360deg
  );
  box-shadow:0 2px 8px rgba(0,0,0,0.16);
  transition:transform 0.2s ease;
}
.opt-btn:hover .opt-wheel { transform:scale(1.12) rotate(30deg); }
.opt-dropdown {
  position:absolute; top:calc(100% + 8px); right:0;
  background:#fff; border:1px solid var(--border);
  border-radius:10px; box-shadow:0 8px 24px rgba(14,26,51,0.14);
  min-width:188px; padding:6px;
  display:none; z-index:20;
}
.opt-dropdown.open { display:block; }
.opt-item {
  display:flex; align-items:center; gap:10px;
  padding:9px 12px; border-radius:7px; cursor:pointer;
  font-family:'Gilroy',sans-serif; font-size:13px; font-weight:500;
  color:var(--text); border:none; background:none; width:100%; text-align:left;
  transition:background 0.12s;
}
.opt-item:hover  { background:var(--brand-soft); }
.opt-item.active { background:var(--brand-soft); color:var(--brand); font-weight:600; }
.opt-badge {
  width:22px; height:22px; border-radius:5px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700;
  background:var(--brand-soft); color:var(--brand);
  letter-spacing:-0.02em;
}

/* Loader exit */


.logo-spinner {
  width:28px; height:28px; border-radius:50%;
  border:2.5px solid rgba(24,82,254,0.15);
  border-top-color:#1852FE;
  animation:spin 0.8s linear infinite;
  margin:0 auto;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Option 1: static logo + spinner ── */
.logo-mark-static { margin-bottom:20px; }
.logo-mark-static img { display:block; }
.logo-spinner {
  width:28px; height:28px; border-radius:50%;
  border:2.5px solid rgba(24,82,254,0.15);
  border-top-color:#1852FE;
  animation:spin 0.8s linear infinite;
  margin:0 auto;
}
@keyframes spin { to { transform:rotate(360deg); } }

.app-loader.is-done { opacity:0; visibility:hidden; transition:opacity .4s ease, visibility .4s ease; }
@media (prefers-reduced-motion: reduce) { 
.app-loader.is-done { transition:none; } }
:focus-visible { outline:2px solid var(--brand); outline-offset:2px; border-radius:3px; }

</style>
</head>
<body>

<!-- FULL-PAGE LOADER -->
<div class="app-loader" id="appLoader" role="status" aria-live="polite" aria-label="Loading your workspace">

  <div class="opt-wrap">
    <button class="opt-btn" id="optBtn" aria-label="Switch loader style" title="Switch loader style">
      <span class="opt-wheel" aria-hidden="true"></span>
    </button>
    <div class="opt-dropdown" id="optDropdown" role="menu">
      <button class="opt-item active" data-opt="1" role="menuitem">
        <span class="opt-badge">gc</span>GeoConnect logo
      </button>
      <button class="opt-item" data-opt="2" role="menuitem">
        <span class="opt-badge">co</span>co — from connect
      </button>
      <button class="opt-item" data-opt="3" role="menuitem">
        <span class="opt-badge">g</span>g — mark only
      </button>
    </div>
  </div>

  <div class="loader-stack">

    <!-- Option 1: GeoConnect full logo -->

<script>
(function() {
  var btn   = document.getElementById('optBtn');
  var dd    = document.getElementById('optDropdown');
  var wrap  = document.querySelector('.opt-wrap');
  var marks = {1:document.getElementById('mark1'),2:document.getElementById('mark2'),3:document.getElementById('mark3')};
  var current = 1;

  btn.onclick = function(e) { e.stopPropagation(); dd.classList.toggle('open'); };

  document.onclick = function(e) {
    if (!wrap.contains(e.target)) dd.classList.remove('open');
  };

  var items = dd.querySelectorAll('.opt-item');
  for (var i = 0; i < items.length; i++) {
    (function(item) {
      item.onclick = function(e) {
        e.stopPropagation();
        var opt = parseInt(item.dataset.opt);
        marks[current].classList.remove('active');
        dd.querySelector('.opt-item.active').classList.remove('active');
        current = opt;
        marks[current].classList.add('active');
        item.classList.add('active');
        dd.classList.remove('open');
      };
    })(items[i]);
  }
})();
</script>
